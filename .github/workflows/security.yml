trivy_fs:
    name: Trivy (Filesystem)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy Scan
        # 這裡改用另一個寫法，完全不帶 v 或特定 SHA，先看能不能解析最基本的版本
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'