name: Security Scan

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:
    branches: ["main", "master", "develop"]
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch: {}

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  semgrep:
    name: Semgrep (SAST)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run Semgrep (OSS rules)
        uses: semgrep/semgrep-action@v1
        with:
          config: p/ci
          generateSarif: true
          uploadSarif: true
          additional_args: '--severity=ERROR --exclude=docs/** --exclude=.github/** --exclude=**/*.md'

  gitleaks:
    name: Gitleaks (Secret Scanning)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload SARIF (Gitleaks)
        uses: github/codeql-action/upload-sarif@v3 # 建議使用 v3/v4 穩定版
        with:
          sarif_file: results.sarif
  trivy_fs:
      name: Trivy (Filesystem)
      runs-on: ubuntu-latest
      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        # 改用直接下載 Binary 的方式，避開 GPG/APT 報錯
        - name: Install Trivy
          run: |
            VERSION="0.69.3"
            echo "Installing Trivy v${VERSION}..."
            wget https://github.com/aquasecurity/trivy/releases/download/v${VERSION}/trivy_${VERSION}_Linux-64bit.tar.gz
            tar zxvf trivy_${VERSION}_Linux-64bit.tar.gz
            sudo mv trivy /usr/local/bin/

        - name: Run Trivy Scan
          run: |
            trivy fs --format sarif --output trivy-results.sarif --severity CRITICAL,HIGH --ignore-unfixed .

        - name: Upload SARIF
          # 順便幫你升級到 v4，解決你看到的 Deprecation Warning
          uses: github/codeql-action/upload-sarif@v4
          if: always()
          with:
            sarif_file: trivy-results.sarif