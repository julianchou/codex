name: Security Scan

on:
  push:
    branches: ["main", "master", "develop"]
  pull_request:
    branches: ["main", "master", "develop"]
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch: {}

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  semgrep:
    name: Semgrep (SAST)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run Semgrep (OSS rules)
        uses: semgrep/semgrep-action@v1
        with:
          config: p/ci
          generateSarif: true
          uploadSarif: true
          additional_args: '--severity=ERROR --exclude=docs/** --exclude=.github/** --exclude=**/*.md'
  gitleaks:
    name: Gitleaks (Secret Scanning)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload SARIF (Gitleaks)
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: results.sarif
  trivy_fs:
    name: Trivy (Filesystem)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Trivy FS
        uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
          version: 'v0.68.2'
          cache: 'false'

      - name: Upload SARIF (Trivy)
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif






