name: CI

on:
  push:
    branches: ["main", "master", "develop", "feature/**", "fix/**"]
  pull_request:
    branches: ["main", "master", "develop"]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read
  checks: write

jobs:
  lint_and_test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 收斂：僅保留最常見的語言環境，其他由腳本偵測且以 -NoInstall 避免安裝
      - name: Set up Node.js (if package.json)
        if: hashFiles('**/package.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python (if requirements/pyproject)
        if: hashFiles('**/requirements*.txt') != '' || hashFiles('**/pyproject.toml') != ''
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 注意：如需使用 secrets，請在此以 placeholder 示意並於 Repo 設定中加入
      # env:
      #   MY_SERVICE_TOKEN: ${{ secrets.MY_SERVICE_TOKEN }}

      - name: Run lint (PowerShell, -NoInstall)
        shell: pwsh
        run: ./scripts/lint.ps1 -NoInstall

      - name: Run tests (PowerShell, -NoInstall)
        shell: pwsh
        run: ./scripts/test.ps1 -NoInstall

      - name: Upload test results (if any)
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            artifacts/test-results/**
            artifacts/junit/**
            artifacts/reports/**
          if-no-files-found: ignore

      - name: Upload coverage (if any)
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: |
            artifacts/coverage/**
          if-no-files-found: ignore

      - name: Job summary
        shell: pwsh
        run: |
          Add-Content $env:GITHUB_STEP_SUMMARY "# CI 結果（收斂版）"
          Add-Content $env:GITHUB_STEP_SUMMARY "- 使用 -NoInstall 模式執行 Lint/Test。"
          Add-Content $env:GITHUB_STEP_SUMMARY "- Node/Python 以條件式 setup，其餘語言由腳本偵測。"
